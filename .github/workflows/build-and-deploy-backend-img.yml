name: Build and Deploy Backend Image

on:
  push:
    tags:
      - 'V*.*.*'

jobs:
  build-and-push:
    name: Build and Push to GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tag commit belongs to default branch
        id: branch-check
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          git fetch origin "${DEFAULT_BRANCH}" --depth=1

          if git merge-base --is-ancestor "${GITHUB_SHA}" "origin/${DEFAULT_BRANCH}"; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Tag ${GITHUB_REF_NAME} does not point to a commit in ${DEFAULT_BRANCH}. Skipping publish."
          echo "should_publish=false" >> "$GITHUB_OUTPUT"

      - name: Derive image name
        id: image
        if: steps.branch-check.outputs.should_publish == 'true'
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract Docker metadata
        id: meta
        if: steps.branch-check.outputs.should_publish == 'true'
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Set up Docker Buildx
        if: steps.branch-check.outputs.should_publish == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.branch-check.outputs.should_publish == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: steps.branch-check.outputs.should_publish == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
